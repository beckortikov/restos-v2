ext {
    minSdkVersion = 24
    // compileSdkVersion stays at 36 because Capacitor 8 internals reference
    // Build.VERSION_CODES.VANILLA_ICE_CREAM (API 35) and won't compile on 34.
    // What matters for runtime edge-to-edge behavior is *targetSdkVersion*:
    // Google made edge-to-edge mandatory at API 35+, so we pin TARGET to 34.
    // On API 34, setDecorFitsSystemWindows(true) in MainActivity actually
    // works and the WebView sits below the status bar on Samsung A55 / Pixel.
    compileSdkVersion = 36
    targetSdkVersion = 34
    androidxActivityVersion = '1.11.0'
    androidxAppCompatVersion = '1.7.1'
    androidxCoordinatorLayoutVersion = '1.3.0'
    androidxCoreVersion = '1.17.0'
    androidxFragmentVersion = '1.8.9'
    coreSplashScreenVersion = '1.2.0'
    androidxWebkitVersion = '1.14.0'
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.3.0'
    androidxEspressoCoreVersion = '3.7.0'
    cordovaAndroidVersion = '14.0.1'
}