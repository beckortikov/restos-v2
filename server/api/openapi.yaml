        status: { type: string }
        type: { type: string }
        table_id: { type: string, format: uuid }
        waiter_id: { type: string, format: uuid }
        cashier_id: { type: string, format: uuid }
        total: { $ref: "#/components/schemas/Decimal" }
        # Service/tip/discount snapshots — фиксируются при close, нужны UI для чека.
