  /api/v1/finance/accounts/{id}:
    patch:
      tags: [finance]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/FinancialAccountInput" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/FinancialAccount" } } } } }
