        "204": { description: No content }
        "409": { $ref: "#/components/responses/Error" }
  /api/v1/finance/accounts/transfer:
    post:
      tags: [finance]
      summary: Атомарный перевод между двумя счетами с парой FinancialOperation
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/AccountTransferInput" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/AccountTransferResult" } } } } }

  # ─── Finance: Operations ────────────────────────────────────────────────
  /api/v1/finance/operations:
    get:
      tags: [finance]
      summary: Список финансовых операций (paged)
      parameters:
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - { in: query, name: type, schema: { type: string, enum: [in, out] } }
        - { in: query, name: account_id, schema: { type: string, format: uuid } }
        - { in: query, name: category, schema: { type: string } }
        - { in: query, name: activity, schema: { type: string } }
        - { in: query, name: shift_id, schema: { type: string, format: uuid } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/FinancialOperationsList" } } } } }
    post:
      tags: [finance]
      summary: Ручное создание финансовой операции (обновляет баланс счёта в той же tx)
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/FinancialOperationInput" } } } }
      responses: { "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/FinancialOperation" } } } } }

  # ─── Finance: Custom Categories ─────────────────────────────────────────
  /api/v1/finance/custom-categories:
