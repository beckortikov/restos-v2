      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CustomCategoryInput" } } } }
      responses: { "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/CustomCategory" } } } } }
  /api/v1/finance/custom-categories/{id}:
    delete:
      tags: [finance]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses: { "204": { description: No content } }

  # ─── Finance: JSON reports ──────────────────────────────────────────────
  /api/v1/finance/pnl:
    get:
      tags: [finance]
      summary: P&L отчёт (JSON) за период
      parameters: [ { $ref: "#/components/parameters/From" }, { $ref: "#/components/parameters/To" } ]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PnLReport" } } } } }
  /api/v1/finance/cashflow:
    get:
      tags: [finance]
      summary: Cash-flow отчёт (JSON) за период
      parameters: [ { $ref: "#/components/parameters/From" }, { $ref: "#/components/parameters/To" } ]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CashflowReport" } } } } }
  /api/v1/finance/balance:
    get:
      tags: [finance]
      summary: Баланс (активы / обязательства / собственный капитал)
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BalanceReport" } } } } }
  /api/v1/finance/monthly-revenue:
    get:
      tags: [finance]
      summary: Выручка по месяцам (последние N)
      parameters:
        - { in: query, name: months, schema: { type: integer, default: 12, minimum: 1, maximum: 60 } }
        - { in: query, name: year, schema: { type: integer } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/MonthlyRevenueList" } } } } }

  # ─── Finance: Payroll & service charge ──────────────────────────────────
  /api/v1/finance/salary/pay:
    post:
      tags: [finance, payroll]
      summary: Выплата ЗП (FinancialOperation type=out + декремент счёта в tx)
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/SalaryPayInput" } } } }
      responses: { "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/FinancialOperation" } } } } }
  /api/v1/finance/service-charge/pay:
    post:
      tags: [finance, payroll]
      summary: Выплата сервис-чарджа официанту
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ServiceChargePayInput" } } } }
      responses: { "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/FinancialOperation" } } } } }
  /api/v1/finance/service-accrual/by-waiter:
    get:
      tags: [finance, payroll]
      summary: Начисление сервис-чарджа по официантам за период
      parameters: [ { $ref: "#/components/parameters/From" }, { $ref: "#/components/parameters/To" } ]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ServiceAccrualList" } } } } }
  /api/v1/finance/service-accrual/by-shift/{shift_id}:
    get:
      tags: [finance, payroll]
      summary: Начисление сервис-чарджа по официантам в смене
      parameters: [ { in: path, name: shift_id, required: true, schema: { type: string, format: uuid } } ]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ServiceAccrualList" } } } } }
  /api/v1/finance/service-payout/by-waiter:
    get:
      tags: [finance, payroll]
      summary: Выплаты сервис-чарджа по официантам за период
      parameters: [ { $ref: "#/components/parameters/From" }, { $ref: "#/components/parameters/To" } ]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ServicePayoutList" } } } } }
  /api/v1/finance/service-payout/by-shift/{shift_id}:
    get:
      tags: [finance, payroll]
      summary: Выплаты сервис-чарджа по официантам в смене
      parameters: [ { in: path, name: shift_id, required: true, schema: { type: string, format: uuid } } ]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ServicePayoutList" } } } } }

  # ─── Phase 14: cutover extras ───────────────────────────────────────────
  /api/v1/shifts/active:
    get:
      tags: [shifts]
      summary: Текущая open-смена (404 если нет)
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CashShift" } } } }
        "404": { description: Not Found }

  /api/v1/shifts/{id}/zreport:
    get:
      tags: [shifts]
      summary: Z-отчёт смены (JSON, агрегаты + ops + revenue_by_method)
      parameters: [ { in: path, name: id, required: true, schema: { type: string, format: uuid } } ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  shift: { type: object }
                  revenue_by_method: { type: array, items: { type: object } }
                  sales_by_waiter: { type: array, items: { type: object } }
                  sales_by_category: { type: array, items: { type: object } }
                  sales_by_order_type: { type: array, items: { type: object } }
                  guests_count: { type: integer }
                  operations: { type: array, items: { $ref: "#/components/schemas/CashShiftOperation" } }
                  discrepancy: { type: string }
                  previous:
                    type: object
                    nullable: true
                    properties:
                      revenue: { type: string }
                      orders_count: { type: integer }
                      avg_check: { type: string }
                      guests_count: { type: integer }
                      closed_at: { type: string, format: date-time, nullable: true }

  /api/v1/shifts/{id}/print-z:
    post:
      tags: [shifts]
      summary: Печать Z-отчёта смены на receipt-принтер
      description: |
        Создаёт PrintJob type='z_report' с готовым ESC/POS payload.
        Реальная отправка — асинхронным воркером очереди.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [job_id, status]
                properties:
                  job_id: { type: string, format: uuid }
                  status: { type: string }

  /api/v1/shifts/{id}/print-x:
    post:
      tags: [shifts]
      summary: Печать промежуточного X-отчёта (без обнуления)
      description: |
        Аналог print-z, но layout — X-отчёт (без секции «Расхождение»).
        Может вызываться при открытой смене.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [job_id, status]
                properties:
                  job_id: { type: string, format: uuid }
                  status: { type: string }

  /api/v1/shifts/{id}/revenue:
    get:
      tags: [shifts]
      summary: Денормализованная статистика смены (cash, card, count, avg)
      parameters: [ { in: path, name: id, required: true, schema: { type: string, format: uuid } } ]
      responses: { "200": { description: OK } }

  /api/v1/shifts/{id}/operations-list:
    get:
      tags: [shifts]
      summary: Список операций смены (без header'а) — реальный путь /shifts/{id}/operations (GET)
      parameters: [ { in: path, name: id, required: true, schema: { type: string, format: uuid } } ]
      responses: { "200": { description: OK } }

  /api/v1/shifts/{id}/expenses:
    post:
      tags: [shifts]
      summary: Внести cash_in/cash_out/expense (alias к cash_out)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, amount]
              properties:
                type: { type: string, enum: [cash_in, cash_out, expense] }
                amount: { type: string }
                description: { type: string }
      responses: { "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/CashShiftOperation" } } } } }

  /api/v1/shifts/{id}/expenses/{op_id}:
    delete:
      tags: [shifts]
      summary: Удалить cash-операцию (только если смена открыта)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: op_id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204": { description: No Content }
        "404": { description: Not Found }
        "409": { description: Shift not open }
  /api/v1/cash-shift-operations/{op_id}:
    delete:
      tags: [shifts]
      summary: "Удалить cash-операцию по ID (сервер сам резолвит shift_id, проверяет статус смены)"
      parameters:
        - { in: path, name: op_id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204": { description: No Content }
        "404": { description: Not Found }
        "409": { description: Shift not open }

  /api/v1/stop-list:
    get:
      tags: [menu]
      summary: Стоп-лист (auto + manual), compute-on-read
      responses: { "200": { description: OK } }

  /api/v1/stop-list/{menu_item_id}/override:
    post:
      tags: [menu]
      summary: Поставить/снять manual stop_list_override
      parameters:
        - { in: path, name: menu_item_id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [override]
              properties: { override: { type: boolean } }
      responses: { "200": { description: OK } }

  /api/v1/stop-list/recompute:
    post:
      tags: [menu]
      summary: No-op (FE-совместимость; v4 считает on-read)
      parameters: [ $ref: "#/components/parameters/IdempotencyKey" ]
      responses: { "200": { description: OK } }

  /api/v1/semi/prepare:
    post:
      tags: [semi]
      summary: Произвести N единиц полуфабриката из рецепта
      parameters: [ $ref: "#/components/parameters/IdempotencyKey" ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [semi_type_id, qty]
              properties:
                semi_type_id: { type: string, format: uuid }
                qty: { type: string }
                prepared_by: { type: string }
      responses: { "200": { description: OK } }

  /api/v1/semi/consume:
    post:
      tags: [semi]
      summary: Списать N единиц полуфабриката
      parameters: [ $ref: "#/components/parameters/IdempotencyKey" ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [semi_type_id, qty]
              properties:
                semi_type_id: { type: string, format: uuid }
                qty: { type: string }
                order_id: { type: string, format: uuid }
      responses: { "200": { description: OK } }

  /api/v1/menu/items/{id}/max-portions:
    get:
      tags: [menu]
      summary: Сколько порций можно приготовить прямо сейчас
      parameters: [ { in: path, name: id, required: true, schema: { type: string, format: uuid } } ]
      responses: { "200": { description: OK } }

  /api/v1/menu/items/{id}/batch/produce:
    post:
      tags: [menu]
      summary: Партионная готовка — произвести N порций (списать ингредиенты)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [qty]
              properties:
                qty: { type: integer, minimum: 1 }
                prepared_by: { type: string }
      responses: { "200": { description: OK } }

  /api/v1/menu/items/{id}/batch/decrement:
    post:
      tags: [menu]
      summary: Декремент prepared_qty (без списания ингредиентов)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                qty: { type: integer, minimum: 1, default: 1 }
                order_id: { type: string, format: uuid }
      responses: { "200": { description: OK } }

  /api/v1/menu/items/{id}/batch/writeoff:
    post:
      tags: [menu]
      summary: Списать партию (целиком или N порций)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                qty: { type: integer, minimum: 1 }
                reason: { type: string }
      responses: { "200": { description: OK } }

  /api/v1/menu/items/{id}/batch/logs:
    get:
      tags: [menu]
      summary: История партионной готовки
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses: { "200": { description: OK } }
  /api/v1/menu/batch/logs:
    get:
      tags: [menu]
      summary: История партионной готовки (по всем items)
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses: { "200": { description: OK } }

  /api/v1/audit-log:
    get:
      tags: [admin]
      summary: Audit log с фильтрами + offset-пагинация
      parameters:
        - { in: query, name: entity_type, schema: { type: string } }
        - { in: query, name: action, schema: { type: string } }
        - { in: query, name: user_id, schema: { type: string, format: uuid } }
        - { in: query, name: from, schema: { type: string, format: date-time } }
        - { in: query, name: to, schema: { type: string, format: date-time } }
        - { in: query, name: limit, schema: { type: integer, default: 50, maximum: 500 } }
        - { in: query, name: offset, schema: { type: integer, default: 0 } }
      responses: { "200": { description: OK } }

  /api/v1/print/jobs/{id}/reprint:
    post:
      tags: [print_jobs]
      summary: Перепечатка — клонирует job с новым id, status='pending'
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses: { "201": { description: Created } }

  /api/v1/print/jobs/active-by-station:
    get:
      tags: [print_jobs]
      summary: Pending jobs для станции (для KDS)
      parameters:
        - { in: query, name: station, required: true, schema: { type: string } }
      responses: { "200": { description: OK } }

  /api/v1/reservations/for-table/{table_id}:
    get:
      tags: [admin]
      summary: Брони на конкретный стол в диапазоне (default = next 12h)
      parameters:
        - { in: path, name: table_id, required: true, schema: { type: string, format: uuid } }
        - { in: query, name: from, schema: { type: string, format: date-time } }
        - { in: query, name: to, schema: { type: string, format: date-time } }
      responses: { "200": { description: OK } }

  /api/v1/time-entries/active:
    get:
      tags: [payroll]
      summary: Текущая открытая запись для пользователя (404 если нет)
      parameters:
        - { in: query, name: user_id, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/TimeEntry" } } } }
        "404": { description: Not Found }

  /api/v1/time-entries/{id}:
    patch:
      tags: [payroll]
      summary: Manual edit time entry (manager)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                clock_in:  { type: string, format: date-time }
                clock_out: { type: string, format: date-time }
                role:      { type: string }
                note:      { type: string }
      responses: { "200": { description: OK } }
    delete:
      tags: [payroll]
      parameters: [ { in: path, name: id, required: true, schema: { type: string, format: uuid } }, { $ref: "#/components/parameters/IdempotencyKey" } ]
      responses: { "204": { description: No content } }

  /api/v1/waiters/{id}/today-stats:
    get:
      tags: [payroll]
      summary: Стата официанта за сегодня (orders/served/revenue/hours)
      parameters: [ { in: path, name: id, required: true, schema: { type: string, format: uuid } } ]
      responses: { "200": { description: OK } }

  # ─── SSE ────────────────────────────────────────────────────────────────
  /api/v1/events:
    get:
      tags: [events]
      summary: SSE-поток (order.*, shift.*, stock.movement, license.updated, hello, ping)
      responses:
        "200":
          description: text/event-stream
          content:
            text/event-stream:
              schema: { type: string }

# ═══════════════════════════════════════════════════════════════════════════
# COMPONENTS
# ═══════════════════════════════════════════════════════════════════════════
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer }

  parameters:
    Limit:
      in: query
      name: limit
      schema: { type: integer, default: 50, maximum: 200 }
    Cursor:
      in: query
      name: cursor
      schema: { type: string }
      description: base64url-token из next_cursor предыдущего ответа
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: false
      schema: { type: string, format: uuid }
      description: UUID, обязателен для всех write-операций (auto-added by client middleware)
    From: { in: query, name: from, schema: { type: string, format: date-time } }
    To:   { in: query, name: to,   schema: { type: string, format: date-time } }

  responses:
    OK:
      description: OK
      content: { application/json: { schema: { type: object } } }
    Error:
      description: Error envelope
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
    XLSX:
      description: XLSX file
      content:
        application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
          schema: { type: string, format: binary }
      headers:
        Content-Disposition:
          schema: { type: string }
          description: attachment; filename="..."

  # ───── schemas ─────
  schemas:
    ErrorEnvelope:
      type: object
      required: [code, message]
      properties:
        code: { type: string, description: "Стабильный машинно-читаемый код" }
        message: { type: string }
        details: { type: object, additionalProperties: true }

    SessionInfo:
      type: object
      properties:
        user_id: { type: string, format: uuid }
        restaurant_id: { type: string, format: uuid }
        user_name: { type: string }
        role: { type: string }
        expires_at: { type: string, format: date-time }

    LicenseStatus:
      type: object
      properties:
        state: { type: string, enum: [none, active, grace, warning, locked] }
        expires_at: { type: string, format: date-time }
        days_left: { type: integer }
        days_until_lock: { type: integer }
        is_blocked: { type: boolean }
        block_reason: { type: string }
        edition: { type: string, enum: [start, business, pro] }

    Decimal: { type: string, description: "NUMERIC(14,4) как строка ('123.45')" }

    # ─── Menu ──
    MenuItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        category: { type: string }
        price: { $ref: "#/components/schemas/Decimal" }
        emoji: { type: string }
        is_available: { type: boolean }
        station: { type: string }
        cogs: { $ref: "#/components/schemas/Decimal" }
        unit: { type: string }
        unit_size: { $ref: "#/components/schemas/Decimal" }
        sale_step: { $ref: "#/components/schemas/Decimal" }
        low_stock_threshold: { type: integer }
    MenuItemInput:
      type: object
      properties:
        name: { type: string }
        category: { type: string }
        price: { $ref: "#/components/schemas/Decimal" }
        emoji: { type: string }
        is_available: { type: boolean }
        station: { type: string }
        cogs: { $ref: "#/components/schemas/Decimal" }
        unit: { type: string }
        unit_size: { $ref: "#/components/schemas/Decimal" }
    MenuItemWithExtras:
      allOf:
        - $ref: "#/components/schemas/MenuItem"
        - type: object
          properties:
            tech_card_lines:
              type: array
              description: |
                Всегда присутствует (пустой массив, если не запрошен через
                `?include=tech_cards`). Это уменьшает type-ветвление на фронте.
              items: { $ref: "#/components/schemas/TechCardLine" }
    IngredientPrice:
      type: object
      properties:
        price: { $ref: "#/components/schemas/Decimal" }
        unit: { type: string }
        waste_percent: { $ref: "#/components/schemas/Decimal" }
    MenuItemsList:
      type: object
      description: |
        Универсальный envelope для /menu/items. Поля `tech_card_lines`
        (per-item) и `ingredient_prices` (top-level) всегда присутствуют:
        пустые, если соответствующий `include` не задан.

        `?include=tech_cards` — заполняет `tech_card_lines` для каждого блюда
        (одним batch-SELECT'ом, не N+1).

        `?include=tech_cards,ingredient_prices` — дополнительно подгружает цены
        ингредиентов из tech card lines в top-level `ingredient_prices`.
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/MenuItemWithExtras" }
        ingredient_prices:
          type: object
          additionalProperties: { $ref: "#/components/schemas/IngredientPrice" }
        next_cursor: { type: string }

    MenuCategory:
      type: object
      properties: { id: { type: string, format: uuid }, name: { type: string }, sort_order: { type: integer } }
    MenuCategoriesList: { type: object, properties: { data: { type: array, items: { $ref: "#/components/schemas/MenuCategory" } } } }

    # ─── Floor ──
    Zone: { type: object, properties: { id: { type: string, format: uuid }, name: { type: string }, sort_order: { type: integer } } }
    ZoneInput:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        sort_order: { type: integer }
    ZonesList: { type: object, properties: { data: { type: array, items: { $ref: "#/components/schemas/Zone" } } } }
    Table:
      type: object
      properties:
        id: { type: string, format: uuid }
        number: { type: integer }
        capacity: { type: integer }
        zone_id: { type: string, format: uuid }
        status: { type: string, enum: [free, occupied, reserved, dirty] }
    TablesList: { type: object, properties: { data: { type: array, items: { $ref: "#/components/schemas/Table" } } } }
    TableInput:
      type: object
      properties:
        name: { type: string }
        number: { type: integer }
        capacity: { type: integer }
        zone_id: { type: string, format: uuid }
        status: { type: string, enum: [free, occupied, reserved, dirty, merged] }
        current_order_id: { type: string }
        waiter_id: { type: string }
        opened_at: { type: string, format: date-time }

    # ─── Stock ──
    Ingredient:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        qty: { $ref: "#/components/schemas/Decimal" }
        unit: { type: string }
        min_qty: { $ref: "#/components/schemas/Decimal" }
        price_per_unit: { $ref: "#/components/schemas/Decimal" }
    IngredientsList: { type: object, properties: { data: { type: array, items: { $ref: "#/components/schemas/Ingredient" } }, next_cursor: { type: string } } }
    IngredientInput:
      type: object
      properties:
        name: { type: string }
        category: { type: string }
        qty: { $ref: "#/components/schemas/Decimal" }
        min_qty: { $ref: "#/components/schemas/Decimal" }
        unit: { type: string }
        price_per_unit: { $ref: "#/components/schemas/Decimal" }
        waste_percent: { $ref: "#/components/schemas/Decimal" }
        is_food: { type: boolean }
    StringList: { type: object, properties: { data: { type: array, items: { type: string } } } }
    StockMovement:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string }
        ingredient_id: { type: string, format: uuid }
        ingredient_name: { type: string }
        qty: { $ref: "#/components/schemas/Decimal" }
        unit: { type: string }
        description: { type: string }
        created_at: { type: string, format: date-time }
    StockMovementsList: { type: object, properties: { data: { type: array, items: { $ref: "#/components/schemas/StockMovement" } }, next_cursor: { type: string } } }
    StockReceiptsList: { type: object, properties: { data: { type: array, items: { $ref: "#/components/schemas/StockReceipt" } }, next_cursor: { type: string } } }
    StockWriteoffsList: { type: object, properties: { data: { type: array, items: { $ref: "#/components/schemas/StockWriteoff" } }, next_cursor: { type: string } } }
    ConfirmReceiptInput:
      type: object
      properties:
        account_id: { type: string, format: uuid }
        payment_type: { type: string, enum: [paid, credit] }
    InventoryChecksList: { type: object, properties: { data: { type: array, items: { $ref: "#/components/schemas/InventoryCheck" } }, next_cursor: { type: string } } }
    InventoryCheckLine:
      type: object
      properties:
        id: { type: string, format: uuid }
        check_id: { type: string, format: uuid }
        ingredient_id: { type: string, format: uuid }
        ingredient_name: { type: string }
        unit: { type: string }
        system_qty: { $ref: "#/components/schemas/Decimal" }
        actual_qty: { $ref: "#/components/schemas/Decimal" }
        diff: { $ref: "#/components/schemas/Decimal" }
    InventoryCheckLinesList: { type: object, properties: { data: { type: array, items: { $ref: "#/components/schemas/InventoryCheckLine" } } } }
    SupplyExpense:
      type: object
      properties:
        id: { type: string, format: uuid }
        ingredient_id: { type: string, format: uuid }
        ingredient_name: { type: string }
        qty: { $ref: "#/components/schemas/Decimal" }
        unit: { type: string }
        reason: { type: string }
        issued_to: { type: string }
        note: { type: string }
        created_at: { type: string, format: date-time }
    SupplyExpensesList: { type: object, properties: { data: { type: array, items: { $ref: "#/components/schemas/SupplyExpense" } }, next_cursor: { type: string } } }
    SupplyExpenseInput:
      type: object
      required: [ingredient_id, qty]
      properties:
        ingredient_id: { type: string, format: uuid }
        qty: { $ref: "#/components/schemas/Decimal" }
        unit: { type: string }
        reason: { type: string }
        issued_to: { type: string }
        note: { type: string }

    ReceiptInput:
      type: object
      required: [payment_type, lines]
      properties:
        supplier_id: { type: string, format: uuid }
        supplier_name: { type: string }
        date: { type: string }
        note: { type: string }
        payment_type: { type: string, enum: [paid, credit] }
        paid_amount: { $ref: "#/components/schemas/Decimal" }
        due_date: { type: string }
        lines:
          type: array
          items:
            type: object
            required: [ingredient_id, name, qty, price_per_unit]
            properties:
              ingredient_id: { type: string, format: uuid }
              name: { type: string }
              qty: { $ref: "#/components/schemas/Decimal" }
              unit: { type: string }
              price_per_unit: { $ref: "#/components/schemas/Decimal" }
    StockReceipt:
      type: object
      properties:
        id: { type: string, format: uuid }
        total_amount: { $ref: "#/components/schemas/Decimal" }
        paid_amount: { $ref: "#/components/schemas/Decimal" }
        debt_amount: { $ref: "#/components/schemas/Decimal" }

    WriteoffInput:
      type: object
      required: [reason, lines]
      properties:
        reason: { type: string }
        description: { type: string }
        lines:
          type: array
          items:
            type: object
            required: [ingredient_id, name, qty, cost]
            properties:
              ingredient_id: { type: string, format: uuid }
              name: { type: string }
              qty: { $ref: "#/components/schemas/Decimal" }
              cost: { $ref: "#/components/schemas/Decimal" }
    StockWriteoff:
      type: object
      properties:
        id: { type: string, format: uuid }
        total_cost: { $ref: "#/components/schemas/Decimal" }

    InventoryCheckInput:
      type: object
      required: [lines]
      properties:
        note: { type: string }
        lines:
          type: array
          items:
            type: object
            required: [ingredient_id, actual_qty]
            properties:
              ingredient_id: { type: string, format: uuid }
              actual_qty: { $ref: "#/components/schemas/Decimal" }
    InventoryCheck:
      type: object
      properties:
        id: { type: string, format: uuid }
        status: { type: string, enum: [draft, applied] }
        total_items: { type: integer }
        items_with_diff: { type: integer }
        applied_at: { type: string, format: date-time }

    ImportResult:
      type: object
      properties:
        created: { type: integer }
        updated: { type: integer }
        skipped: { type: integer }
        errors:
          type: array
          items: { type: object, properties: { row: { type: integer }, message: { type: string } } }

    # ─── Shifts ──
    CashShift:
      type: object
      properties:
        id: { type: string, format: uuid }
        status: { type: string, enum: [open, closed] }
        opening_balance: { $ref: "#/components/schemas/Decimal" }
        closing_balance: { $ref: "#/components/schemas/Decimal" }
        expected_cash: { $ref: "#/components/schemas/Decimal" }
        cash_revenue: { $ref: "#/components/schemas/Decimal" }
        card_revenue: { $ref: "#/components/schemas/Decimal" }
        orders_count: { type: integer }
        avg_check: { $ref: "#/components/schemas/Decimal" }
        opened_at: { type: string, format: date-time }
        closed_at: { type: string, format: date-time }
    CashShiftOperation:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string, enum: [cash_in, cash_out] }
        amount: { $ref: "#/components/schemas/Decimal" }
        description: { type: string }
    ShiftsList: { type: object, properties: { data: { type: array, items: { $ref: "#/components/schemas/CashShift" } }, next_cursor: { type: string } } }

    # ─── Orders ──
    Order:
      type: object
      properties:
        id: { type: string, format: uuid }
        order_number:
          type: integer
          description: |
            Per-restaurant per-day sequence (см. v2.0.21 + миграция 008).
