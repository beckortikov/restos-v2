openapi: 3.1.0
info:
  title: RestOS v4 — restos-server API
  version: 1.0.0
  description: |
    Полный REST API restos-server (Go) для Electron-фронта, Capacitor APK
    официанта, и будущего Owner Dashboard на Next.js.

    Все эндпоинты под `/api/v1` требуют Bearer-токен (выдаётся через
    POST /api/v1/auth/login). Все мутирующие операции требуют
    `Idempotency-Key` (UUID). Большие коллекции пагинируются через `cursor`.

    Real-time события — через SSE `/api/v1/events`.

servers:
  - url: http://127.0.0.1:3001
    description: Локальный кассирский ПК (Electron)
  - url: http://{lan_host}:3001
    description: LAN-доступ для официантов (Waiter APK)
    variables:
      lan_host:
        default: 192.168.1.10

security:
  - bearerAuth: []

# ─── tags для группировки в Swagger UI ────────────────────────────────────
tags:
  - { name: health,       description: Liveness/readiness probes }
  - { name: auth,         description: PIN-логин и сессии }
  - { name: menu,         description: Меню и категории }
  - { name: floor,        description: Зоны и столы }
  - { name: stock,        description: Склад, движения, инвентаризации }
  - { name: shifts,       description: Кассовые смены }
  - { name: orders,       description: Заказы, позиции, оплата, отмены }
  - { name: printers,     description: Настройка принтеров }
  - { name: print_jobs,   description: Очередь печати }
  - { name: reports,      description: XLSX-отчёты }
  - { name: license,      description: Лицензирование (7+7+lock) }
  - { name: shadow,       description: Параллельный прогон v1↔v4 (Phase 8) }
  - { name: admin,        description: Users / Customers / Suppliers / Reservations / Restaurant }
  - { name: bootstrap,    description: Первичная инициализация (создание первого ресторана и Owner) }
  - { name: finance,      description: Assets / Liabilities / Equity / Budget }
  - { name: payroll,      description: TimeEntries (clock-in/out) }
  - { name: semi,         description: Полуфабрикаты (types + stock) }
  - { name: events,       description: Server-Sent Events }

# ═══════════════════════════════════════════════════════════════════════════
# PATHS
# ═══════════════════════════════════════════════════════════════════════════
paths:
  # ─── Health ─────────────────────────────────────────────────────────────
  /healthz:
    get:
      tags: [health]
      summary: Liveness
      security: []
      responses: { "200": { $ref: "#/components/responses/OK" } }

  /readyz:
    get:
      tags: [health]
      summary: Readiness (БД доступна)
      security: []
      responses:
        "200": { $ref: "#/components/responses/OK" }
        "503": { $ref: "#/components/responses/Error" }

  # ─── Auth ───────────────────────────────────────────────────────────────
  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: PIN-login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [restaurant_id, pin]
              properties:
                restaurant_id: { type: string, format: uuid }
                pin: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  session: { $ref: "#/components/schemas/SessionInfo" }
                  user:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      username: { type: string }
                      full_name: { type: string }
                      role: { type: string }
                      permissions:
                        type: array
                        items: { type: string }
                  restaurant:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      name: { type: string }
        "401": { $ref: "#/components/responses/Error" }

  /api/v1/auth/logout:
    post:
      tags: [auth]
      summary: Logout текущего токена
      responses:
        "204": { description: No content }

  # ─── License ────────────────────────────────────────────────────────────
  /api/v1/license/status:
    get:
      tags: [license]
      summary: Текущее состояние лицензии
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/LicenseStatus" } } }

  /api/v1/license/machine-id:
    get:
      tags: [license]
      summary: Fingerprint машины + restaurant_id для активации
      description: |
        Возвращает stable hardware fingerprint (hash MAC+disk+CPU+machine-uuid) и
        restaurant_id текущего инстанса. Клиент копирует эту пару и отправляет
        админу, который выписывает токен с такими же значениями.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [machine_id, restaurant_id]
                properties:
                  machine_id: { type: string, example: "A1B2-7K3M-9XQA" }
                  restaurant_id: { type: string, format: uuid }
                  restaurant_name: { type: string }
                  account_id:
                    type: string
                    format: uuid
                    description: |
                      Если ресторан принадлежит сети (Phase 1 multi-branch),
                      Owner Dashboard в будущем читает агрегаты по этому
                      account_id по всем restaurants владельца.

  /api/v1/license/activate:
    post:
      tags: [license]
      summary: Активация лицензии Ed25519-токеном
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties: { token: { type: string } }
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/LicenseStatus" } } }
        "400": { $ref: "#/components/responses/Error" }

  # ─── Menu ───────────────────────────────────────────────────────────────
  /api/v1/menu/items:
    get:
      tags: [menu]
      summary: Список блюд
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - { in: query, name: category, schema: { type: string } }
        - { in: query, name: q, schema: { type: string }, description: ILIKE по name (pg_trgm GIN) }
        - { in: query, name: available, schema: { type: boolean } }
        - in: query
          name: include
          schema: { type: string }
          description: |
            CSV: `tech_cards` подгружает tech_card_lines для каждого блюда
            (batch, не N+1); `ingredient_prices` дополнительно отдаёт
            top-level карту `ingredient_prices`.
            Пример: `?include=tech_cards,ingredient_prices`.
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/MenuItemsList" } } }
    post:
      tags: [menu]
      summary: Создать блюдо (Manager)
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/MenuItemInput" } } }
      responses:
        "201":
          description: Created
          content: { application/json: { schema: { $ref: "#/components/schemas/MenuItem" } } }

  /api/v1/menu/items/{id}:
    patch:
      tags: [menu]
      summary: Обновить блюдо
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/MenuItemInput" } } }
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/MenuItem" } } }
    delete:
      tags: [menu]
      summary: Soft delete (is_deleted=true)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204": { description: No content }

  /api/v1/menu/items/import:
    post:
      tags: [menu]
      summary: Импорт меню XLSX (upsert by name)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties: { file: { type: string, format: binary } }
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/ImportResult" } } }

  /api/v1/menu/categories:
    get:
      tags: [menu]
      summary: Категории меню
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/MenuCategoriesList" } } }
    post:
      tags: [menu]
      summary: Создать категорию
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties: { name: { type: string }, sort_order: { type: integer } }
      responses:
        "201":
          description: Created
          content: { application/json: { schema: { $ref: "#/components/schemas/MenuCategory" } } }

  /api/v1/menu/categories/{id}:
    patch:
      tags: [menu]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: { name: { type: string }, sort_order: { type: integer } }
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/MenuCategory" } } }
    delete:
      tags: [menu]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses: { "204": { description: No content } }

  # ─── Floor ──────────────────────────────────────────────────────────────
  /api/v1/zones:
    get: { tags: [floor], summary: Зоны зала, responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ZonesList" } } } } } }
    post:
      tags: [floor]
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ZoneInput" } } } }
      responses: { "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Zone" } } } } }

  /api/v1/tables:
    get:
      tags: [floor]
      summary: Столы
      parameters:
        - { in: query, name: zone_id, schema: { type: string, format: uuid } }
        - { in: query, name: status, schema: { type: string, enum: [free, occupied, reserved, dirty] } }
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/TablesList" } } }
    post:
      tags: [floor]
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/TableInput" } } } }
      responses: { "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Table" } } } } }

  # ─── Stock ──────────────────────────────────────────────────────────────
  /api/v1/stock/ingredients:
    get:
      tags: [stock]
      summary: Ингредиенты склада
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - { in: query, name: category, schema: { type: string } }
        - { in: query, name: q, schema: { type: string } }
        - { in: query, name: low, schema: { type: boolean }, description: qty<=min_qty }
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/IngredientsList" } } }
    post:
      tags: [stock]
      summary: Создать ингредиент. Если qty>0 — пишет также StockMovement type=receipt.
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/IngredientInput" } } } }
      responses: { "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Ingredient" } } } } }

  /api/v1/stock/ingredients/{id}:
    patch:
      tags: [stock]
      summary: Обновить ингредиент (qty НЕ принимается — только через stock movements).
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/IngredientInput" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Ingredient" } } } } }
    delete:
      tags: [stock]
      summary: Удалить ингредиент. 409 если используется в tech_card_lines.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses: { "204": { description: No Content } }

  /api/v1/stock/ingredient-categories:
    get:
      tags: [stock]
      summary: Уникальные категории ингредиентов (отсортированные).
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StringList" } } } } }

  /api/v1/stock/movements:
    get:
      tags: [stock]
      summary: Лента движений склада.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - { in: query, name: ingredient_id, schema: { type: string, format: uuid } }
        - { in: query, name: type, schema: { type: string } }
        - { in: query, name: from, schema: { type: string, format: date-time } }
        - { in: query, name: to, schema: { type: string, format: date-time } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StockMovementsList" } } } } }

  /api/v1/stock/ingredients/import:
    post:
      tags: [stock]
      summary: Импорт ингредиентов XLSX
      requestBody:
        required: true
        content: { multipart/form-data: { schema: { type: object, properties: { file: { type: string, format: binary } } } } }
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/ImportResult" } } }

  /api/v1/stock/receipts:
    get:
      tags: [stock]
      summary: Список приёмок.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - { in: query, name: supplier_id, schema: { type: string, format: uuid } }
        - { in: query, name: from, schema: { type: string, format: date-time } }
        - { in: query, name: to, schema: { type: string, format: date-time } }
        - { in: query, name: include, schema: { type: string } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StockReceiptsList" } } } } }
    post:
      tags: [stock]
      summary: Приёмка от поставщика (создаёт stock_movements +qty)
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ReceiptInput" } } }
      responses: { "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/StockReceipt" } } } } }

  /api/v1/stock/receipts/{id}/confirm:
    post:
      tags: [stock]
      summary: Подтвердить приёмку. Для credit — создаст Liability, при account_id — FinancialOperation.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ConfirmReceiptInput" } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StockReceipt" } } } } }

  /api/v1/stock/writeoffs:
    get:
      tags: [stock]
      summary: Список списаний.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - { in: query, name: from, schema: { type: string, format: date-time } }
        - { in: query, name: to, schema: { type: string, format: date-time } }
        - { in: query, name: include, schema: { type: string } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StockWriteoffsList" } } } } }
    post:
      tags: [stock]
      summary: Списание (создаёт stock_movements -qty)
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/WriteoffInput" } } }
      responses: { "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/StockWriteoff" } } } } }

  /api/v1/stock/inventory:
    get:
      tags: [stock]
      summary: Список инвентаризаций.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - { in: query, name: status, schema: { type: string, enum: [draft, applied] } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/InventoryChecksList" } } } } }
    post:
      tags: [stock]
      summary: Создать draft инвентаризации
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/InventoryCheckInput" } } }
      responses: { "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/InventoryCheck" } } } } }

  /api/v1/stock/inventory/{id}:
    get:
      tags: [stock]
      summary: Одна инвентаризация (header).
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/InventoryCheck" } } } } }

  /api/v1/stock/inventory/{id}/lines:
    get:
      tags: [stock]
      summary: Линии инвентаризации.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/InventoryCheckLinesList" } } } } }

  /api/v1/supply-expenses:
    get:
      tags: [stock]
      summary: Хоз. расходы (выдачи со склада не-food).
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - { in: query, name: ingredient_id, schema: { type: string, format: uuid } }
        - { in: query, name: from, schema: { type: string, format: date-time } }
        - { in: query, name: to, schema: { type: string, format: date-time } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/SupplyExpensesList" } } } } }
    post:
      tags: [stock]
      summary: Создать хоз. расход (создаёт StockMovement -qty).
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/SupplyExpenseInput" } } } }
      responses: { "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/SupplyExpense" } } } } }

  /api/v1/stock/inventory/{id}/apply:
    post:
      tags: [stock]
      summary: Применить инвентаризацию (корректирующие stock_movements)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/InventoryCheck" } } } } }

  # ─── Shifts ─────────────────────────────────────────────────────────────
  /api/v1/shifts:
    get:
      tags: [shifts]
      summary: Кассовые смены
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - { in: query, name: status, schema: { type: string, enum: [open, closed] } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ShiftsList" } } } } }
    post:
      tags: [shifts]
      summary: Открыть смену
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [opening_balance]
              properties:
                opening_balance: { type: string }
                account_id: { type: string, format: uuid }
      responses: { "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/CashShift" } } } } }

  /api/v1/shifts/{id}:
    get:
      tags: [shifts]
      summary: Смена + операции
      parameters: [ { in: path, name: id, required: true, schema: { type: string, format: uuid } } ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  shift: { $ref: "#/components/schemas/CashShift" }
                  operations: { type: array, items: { $ref: "#/components/schemas/CashShiftOperation" } }

  /api/v1/shifts/{id}/close:
    post:
      tags: [shifts]
      summary: Закрыть смену (фиксирует expected_cash, closing_balance)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [closing_balance], properties: { closing_balance: { type: string } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CashShift" } } } } }

  /api/v1/shifts/{id}/operations:
    get:
      tags: [shifts]
      summary: Список cash-операций смены
      parameters: [ { in: path, name: id, required: true, schema: { type: string, format: uuid } } ]
      responses: { "200": { description: OK } }
    post:
      tags: [shifts]
      summary: Cash in/out внутри смены
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, amount]
              properties:
                type: { type: string, enum: [cash_in, cash_out] }
                amount: { type: string }
                description: { type: string }
      responses: { "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/CashShiftOperation" } } } } }

  # ─── Orders ─────────────────────────────────────────────────────────────
  /api/v1/orders:
    get:
      tags: [orders]
      summary: Список заказов (slim)
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - { in: query, name: status, schema: { type: string } }
        - { in: query, name: table_id, schema: { type: string, format: uuid } }
        - { in: query, name: shift_id, schema: { type: string, format: uuid } }
        - { in: query, name: waiter_id, schema: { type: string, format: uuid } }
        - { in: query, name: from, schema: { type: string, format: date-time } }
        - { in: query, name: to, schema: { type: string, format: date-time } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/OrdersSlimList" } } } } }
    post:
      tags: [orders]
      summary: Создать заказ + позиции
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateOrderInput" } } }
      responses: { "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Order" } } } } }

  /api/v1/orders/{id}:
    get:
      tags: [orders]
      summary: Заказ + items + modifiers + voids
      parameters: [ { in: path, name: id, required: true, schema: { type: string, format: uuid } } ]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/OrderDetail" } } } } }
    patch:
      tags: [orders]
      summary: "Patch open order header fields (guests_count, comment, customer_id)"
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                guests_count: { type: integer }
                comment: { type: string }
                customer_id: { type: string, format: uuid }
      responses: { "200": { description: OK } }

  /api/v1/order-items/{id}:
    get:
      tags: [orders]
      summary: Точечный lookup позиции заказа (без items/modifiers заказа)
      description: |
        Используется фронтом, чтобы resolve order_id по item_id без линейного
        скана /orders. Tenant-изоляция через JOIN на orders.restaurant_id.
      parameters: [ { in: path, name: id, required: true, schema: { type: string, format: uuid } } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/OrderItem" } } } }
        "404": { description: Not found }

  /api/v1/orders/{id}/items:
    post:
      tags: [orders]
      summary: Добавить позиции в открытый заказ
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items: { type: array, items: { $ref: "#/components/schemas/OrderItemInput" } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Order" } } } } }

  /api/v1/orders/{id}/close:
    post:
      tags: [orders]
      summary: Закрыть заказ — revenue, deduct stock, attach shift, print receipt
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [shift_id]
              properties:
                payment_method:
                  type: string
                  enum: [cash, card, transfer]
                  description: Обязателен, если payments[] пустой (single-payment режим).
                account_id:
                  type: string
                  format: uuid
                  description: Обязателен в single-payment режиме (игнорируется при payments[]).
                shift_id: { type: string, format: uuid }
                tip_amount: { type: string, description: "Decimal как строка." }
                cashier_id:
                  type: string
                  format: uuid
                  description: Кассир, закрывший заказ. Пишется в order.cashier_id.
                discount_type:
                  type: string
                  enum: [percent, fixed]
                  description: Тип скидки. Применяется к order.total ДО формирования financial_operation.
                discount_value:
                  type: string
                  description: Размер скидки (decimal как строка). Для percent 0..100, для fixed <= order.total.
                discount_reason:
                  type: string
                service_percent:
                  type: string
                  description: |
                    Override service-charge % для этого закрытия (decimal).
                    Если nil — берётся order.service_percent (default ресторана).
                    "0" — сервис отключён (кассир снял toggle «Обслуживание»).
                    Включается в total_with_service = (total - discount) + service + tip.
                payments:
                  type: array
                  description: Split-payment. Если задан — payment_method/account_id из top-level игнорируются. Сумма должна равняться total_with_service = (total - discount) + service + tip с tolerance 0.01.
                  items: { $ref: "#/components/schemas/PaymentSplit" }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Order" } } } } }

  /api/v1/orders/{id}/cancel:
    post:
      tags: [orders]
      summary: Отменить заказ + cancel-runner на станции
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [reason], properties: { reason: { type: string } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Order" } } } } }

  /api/v1/orders/{id}/items/{itemId}/void:
    post:
      tags: [orders]
      summary: Отменить одну позицию + cancel-runner на станции
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: itemId, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
                approved_by: { type: string, format: uuid }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/OrderItem" } } } } }

  /api/v1/orders/{id}/split:
    post:
      tags: [orders]
      summary: Разделить счёт (equal | by_items)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode: { type: string, enum: [equal, by_items] }
                count: { type: integer, minimum: 2 }
                splits:
                  type: array
                  items: { type: object, properties: { item_ids: { type: array, items: { type: string, format: uuid } } } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  order: { $ref: "#/components/schemas/Order" }
                  splits: { type: array, items: { $ref: "#/components/schemas/OrderSplit" } }

  /api/v1/orders/{id}/splits:
    get:
      tags: [orders]
      summary: Список splits заказа
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/OrderSplit" } }

  /api/v1/orders/{id}/splits/equal:
    post:
      tags: [orders]
      summary: Разделить счёт на N равных частей (заменяет существующие unpaid splits)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [count]
              properties:
                count: { type: integer, minimum: 2 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  order: { $ref: "#/components/schemas/Order" }
                  splits: { type: array, items: { $ref: "#/components/schemas/OrderSplit" } }

  /api/v1/orders/{id}/splits/by-items:
    post:
      tags: [orders]
      summary: Разделить счёт по группам позиций
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [groups]
              properties:
                groups:
                  type: array
                  items:
                    type: object
                    properties:
                      item_ids: { type: array, items: { type: string, format: uuid } }
      responses:
        "200":
          description: OK

  /api/v1/orders/{id}/splits/cancel:
    post:
      tags: [orders]
      summary: Отменить все unpaid splits заказа
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  order: { $ref: "#/components/schemas/Order" }
                  removed: { type: integer }

  /api/v1/splits/{split_id}/pay:
    post:
      tags: [orders]
      summary: Оплатить split (при оплате последнего — auto-close заказа)
      parameters:
        - { in: path, name: split_id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_method, account_id]
              properties:
                payment_method: { type: string }
                account_id: { type: string, format: uuid }
                account_name: { type: string }
                cashier_id: { type: string, format: uuid }
      responses:
        "200":
          description: OK

  /api/v1/orders/{id}/check-and-close:
    post:
      tags: [orders]
      summary: Проверить оплату всех splits и закрыть заказ если оплачены
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  order_id: { type: string, format: uuid }
                  paid_count: { type: integer }
                  unpaid_count: { type: integer }
                  closed: { type: boolean }
                  order: { $ref: "#/components/schemas/Order" }

  /api/v1/orders/{id}/voids:
    get:
      tags: [orders]
      summary: Voids заказа
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK

  /api/v1/voids:
    get:
      tags: [orders]
      summary: Voids нескольких заказов
      parameters:
        - { in: query, name: order_ids, required: false, schema: { type: string }, description: "comma-separated UUIDs" }
      responses: { "200": { description: OK } }
    post:
      tags: [orders]
      summary: Standalone void (retroactive)
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_id, reason]
              properties:
                order_id: { type: string, format: uuid }
                item_name: { type: string }
                item_qty: { type: integer }
                item_price: { type: string }
                reason: { type: string }
                approved_by: { type: string }
                approved_by_name: { type: string }
                created_by: { type: string }
                created_by_name: { type: string }
      responses: { "201": { description: Created } }

  /api/v1/orders/{id}/items/{itemId}/cancel:
    post:
      tags: [orders]
      summary: Отменить позицию (pre-payment, мягкая)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: itemId, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
                qty: { type: string }
      responses: { "200": { description: OK } }

  /api/v1/orders/{id}/items/{itemId}/served:
    post:
      tags: [orders]
      summary: Отметить позицию как поданную
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: itemId, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses: { "200": { description: OK } }
    delete:
      tags: [orders]
      summary: Снять отметку «подано»
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: itemId, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses: { "200": { description: OK } }

  /api/v1/orders/{id}/items/{itemId}/note:
    patch:
      tags: [orders]
      summary: Установить/очистить комментарий к позиции заказа
      description: |
        Используется официантом для передачи кухне особых пожеланий
        («без лука», «medium-rare»). Печатается на runner и пре-чеке.
        `note=null` или пустая строка после trim — очищает комментарий.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: itemId, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                note: { type: string, nullable: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrderItem" }

  /api/v1/orders/{id}/print-pre-bill:
    post:
      tags: [orders]
      summary: Печать предварительного чека (пре-чек для гостя)
      description: |
        Создаёт PrintJob type='pre_bill' для отправки на receipt-принтер.
        Заказ НЕ закрывается, financial_operations и stock_movements не
        создаются. Можно вызывать многократно — каждый раз новый job.
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [job_id, status]
                properties:
                  job_id: { type: string, format: uuid }
                  status: { type: string }

  /api/v1/orders/{id}/items/{itemId}/claim-print:
    post:
      tags: [orders]
      summary: Атомарно занять позицию на печать (KDS worker lock)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: itemId, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [claimed_by]
              properties:
                station: { type: string }
                claimed_by: { type: string }
      responses: { "200": { description: OK } }

  /api/v1/orders/{id}/items/{itemId}/release-print:
    post:
      tags: [orders]
      summary: Снять lock на печать
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: itemId, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses: { "200": { description: OK } }

  /api/v1/orders/{id}/items/{itemId}/claim-cancel-print:
    post:
      tags: [orders]
      summary: Атомарно занять позицию на cancel-runner печать
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: itemId, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [claimed_by]
              properties:
                station: { type: string }
                claimed_by: { type: string }
      responses: { "200": { description: OK } }

  /api/v1/orders/{id}/items/{itemId}/release-cancel-print:
    post:
      tags: [orders]
      summary: Снять cancel-runner lock
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: itemId, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses: { "200": { description: OK } }

  /api/v1/orders/{id}/reopen:
    post:
      tags: [orders]
      summary: Переоткрыть закрытый заказ
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses: { "200": { description: OK } }
  /api/v1/orders/{id}/start-cooking:
    post:
      tags: [orders]
      summary: "Перевести заказ в cooking"
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties: { cashier_id: { type: string, format: uuid } }
      responses: { "200": { description: OK } }
  /api/v1/orders/{id}/mark-ready:
    post:
      tags: [orders]
      summary: "Перевести заказ в ready"
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses: { "200": { description: OK } }
  /api/v1/orders/{id}/mark-served:
    post:
      tags: [orders]
      summary: "Перевести заказ в served"
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses: { "200": { description: OK } }

  /api/v1/orders/{id}/table:
    post:
      tags: [orders]
      summary: Перенести заказ на другой стол
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_table_id]
              properties:
                new_table_id: { type: string, format: uuid }
      responses: { "200": { description: OK } }

  /api/v1/orders/auto-ready/check:
    post:
      tags: [orders]
      summary: Перевод cooking-заказов с истёкшим expected_ready_at в ready
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      responses: { "200": { description: OK } }

  /api/v1/admin/cleanup/orphan-orders:
    post:
      tags: [admin]
      summary: Отменить старые незакрытые заказы (>24ч)
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      responses: { "200": { description: OK } }

  /api/v1/orders/{id}/transfer:
    post:
      tags: [orders]
      summary: Перенести заказ на другой стол/официанта
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                table_id: { type: string, format: uuid }
                waiter_id: { type: string, format: uuid }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Order" } } } } }

  # ─── Printers ───────────────────────────────────────────────────────────
  /api/v1/printers:
    get:
      tags: [printers]
      summary: Список принтеров
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PrintersList" } } } } }
    post:
      tags: [printers]
      summary: Создать принтер
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/PrinterInput" } } }
      responses: { "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Printer" } } } } }

  /api/v1/printers/{id}:
    get:
      tags: [printers]
      parameters: [ { in: path, name: id, required: true, schema: { type: string, format: uuid } } ]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Printer" } } } } }
    patch:
      tags: [printers]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/PrinterInput" } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Printer" } } } } }
    delete:
      tags: [printers]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
