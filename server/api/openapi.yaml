        discount_reason: { type: string }
        total_with_service: { $ref: "#/components/schemas/Decimal" }
        payment_method: { type: string }
        shift_id: { type: string, format: uuid }
        guests_count: { type: integer }
        comment: { type: string }
        created_at: { type: string, format: date-time }
        ready_at: { type: string, format: date-time }
        expected_ready_at: { type: string, format: date-time }
        closed_at: { type: string, format: date-time }
        cancelled_at: { type: string, format: date-time }
        kitchen_started_at: { type: string, format: date-time }
        is_split: { type: boolean }
        split_count: { type: integer }
