<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestOS — Лицензия приостановлена</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fafafa;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
    }
    .container {
      -webkit-app-region: no-drag;
      text-align: center;
      max-width: 440px;
      width: 100%;
      padding: 40px;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background: #7f1d1d;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #fca5a5;
    }
    .reason {
      color: #a1a1aa;
      font-size: 14px;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .reason-text {
      color: #fafafa;
      font-size: 15px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 12px 16px;
      margin: 16px 0 24px;
      display: none;
    }
    .contact {
      color: #71717a;
      font-size: 13px;
      margin-bottom: 24px;
    }
    button {
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid #27272a;
      border-radius: 8px;
      background: #18181b;
      color: #fafafa;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #27272a; }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { color: #52525b; font-size: 12px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#x1F6AB;</div>
    <h1>Лицензия приостановлена</h1>
    <p class="reason">Доступ к системе временно ограничен администратором.</p>
    <div class="reason-text" id="reasonText"></div>
    <p class="contact">Свяжитесь с поддержкой: support@restos.tj</p>
    <button id="retryBtn" onclick="retry()">Проверить снова</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    // Show block reason from URL params or IPC
    const params = new URLSearchParams(window.location.search)
    const reason = params.get('reason')
    if (reason) {
      document.getElementById('reasonText').textContent = reason
      document.getElementById('reasonText').style.display = 'block'
    }

    // Listen for unblock event from main process
    if (window.restosDesktop && window.restosDesktop.onBlocked) {
      // If we get unblocked, reload
    }

    async function retry() {
      const btn = document.getElementById('retryBtn')
      const status = document.getElementById('status')
      btn.disabled = true
      btn.innerHTML = '<span class="spinner"></span>Проверка...'
      status.textContent = ''

      try {
        const res = await fetch('http://localhost:3001/license-check')
        const data = await res.json()

        if (data.blocked) {
          status.textContent = 'Лицензия по-прежнему приостановлена'
          if (data.reason) {
            document.getElementById('reasonText').textContent = data.reason
            document.getElementById('reasonText').style.display = 'block'
          }
        } else {
          status.textContent = 'Лицензия активна! Перезагрузка...'
          status.style.color = '#86efac'
          setTimeout(() => { window.location.href = '/' }, 1000)
        }
      } catch (err) {
        status.textContent = 'Ошибка подключения: ' + err.message
      }

      btn.disabled = false
      btn.textContent = 'Проверить снова'
    }
  </script>
</body>
</html>
