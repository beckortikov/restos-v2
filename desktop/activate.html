<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestOS — Активация</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fafafa;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
    }
    .container {
      -webkit-app-region: no-drag;
      text-align: center;
      max-width: 400px;
      width: 100%;
      padding: 40px;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: #fff;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 700;
      color: #0a0a0a;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #a1a1aa;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .input-group {
      margin-bottom: 16px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      font-family: monospace;
      letter-spacing: 1px;
      border: 1px solid #27272a;
      border-radius: 8px;
      background: #18181b;
      color: #fafafa;
      outline: none;
      transition: border-color 0.2s;
      text-transform: uppercase;
    }
    input:focus { border-color: #3b82f6; }
    input::placeholder {
      color: #52525b;
      text-transform: none;
      letter-spacing: normal;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2563eb; }
    button:disabled {
      background: #1e3a5f;
      cursor: not-allowed;
      opacity: 0.7;
    }
    .error {
      margin-top: 16px;
      padding: 10px 16px;
      background: #450a0a;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      color: #fca5a5;
      font-size: 14px;
      display: none;
    }
    .success {
      margin-top: 16px;
      padding: 10px 16px;
      background: #052e16;
      border: 1px solid #14532d;
      border-radius: 8px;
      color: #86efac;
      font-size: 14px;
      display: none;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .version {
      position: fixed;
      bottom: 16px;
      right: 16px;
      color: #3f3f46;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">R</div>
    <h1>RestOS</h1>
    <p class="subtitle">Введите лицензионный ключ для активации</p>

    <div class="input-group">
      <input type="text" id="keyInput" placeholder="XXX-2026-XXXXXX" autofocus>
    </div>
    <button id="activateBtn" onclick="activate()">Активировать</button>

    <div class="error" id="error"></div>
    <div class="success" id="success"></div>
  </div>

  <div class="version" id="version"></div>

  <script>
    if (window.restosDesktop) {
      document.getElementById('version').textContent = 'v' + window.restosDesktop.version
    }

    const input = document.getElementById('keyInput')
    const btn = document.getElementById('activateBtn')
    const errorEl = document.getElementById('error')
    const successEl = document.getElementById('success')

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') activate()
    })

    async function activate() {
      const key = input.value.trim()
      if (!key) {
        showError('Введите лицензионный ключ')
        return
      }

      btn.disabled = true
      btn.innerHTML = '<span class="spinner"></span>Проверка...'
      errorEl.style.display = 'none'
      successEl.style.display = 'none'

      try {
        const res = await fetch('http://localhost:3001/activate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ licenseKey: key })
        })
        const data = await res.json()

        if (!res.ok) {
          showError(data.error || 'Неверный ключ')
          btn.disabled = false
          btn.textContent = 'Активировать'
          return
        }

        // Clear old session data (previous restaurant's user/cache)
        localStorage.clear()
        // Clear IndexedDB caches
        if (window.indexedDB) {
          const dbs = await window.indexedDB.databases?.() || []
          for (const db of dbs) { if (db.name) window.indexedDB.deleteDatabase(db.name) }
        }

        successEl.textContent = 'Активировано: ' + (data.restaurantName || 'OK') + '. Загрузка...'
        successEl.style.display = 'block'

        setTimeout(() => {
          window.location.href = '/'
        }, 1500)

      } catch (err) {
        showError('Ошибка подключения к серверу: ' + err.message)
        btn.disabled = false
        btn.textContent = 'Активировать'
      }
    }

    function showError(msg) {
      errorEl.textContent = msg
      errorEl.style.display = 'block'
    }
  </script>
</body>
</html>
